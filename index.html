<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Link Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background: radial-gradient(circle at top right, #f8fafc, #e2e8f0);
            min-height: 100vh;
            color: #1e293b;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .link-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .link-card:hover {
            transform: scale(1.05) translateY(-5px);
            background: white;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .icon-box {
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.02);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-12">

    <div class="max-w-6xl mx-auto">
        <!-- Dashboard Header -->
        <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
            <div class="space-y-2">
                <div class="inline-flex items-center gap-2 px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-[10px] font-black uppercase tracking-widest">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                    </span>
                    Workspace Online
                </div>
                <h1 class="text-4xl font-black tracking-tighter text-slate-900">Link<span class="text-blue-600">Hub.</span></h1>
                <p class="text-slate-500 text-sm font-medium">รวมทางลัดการทำงานของคุณไว้ในที่เดียว</p>
            </div>
            
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="relative flex-1 md:w-80">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                    <input type="text" id="searchInput" placeholder="ค้นหาลิงก์..." 
                        class="w-full pl-12 pr-4 py-4 rounded-2xl glass-panel border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <button onclick="toggleAddForm()" class="p-4 bg-slate-900 text-white rounded-2xl hover:bg-blue-600 transition-colors shadow-lg">
                    <i data-lucide="plus" id="addIcon"></i>
                </button>
            </div>
        </div>

        <!-- Add Link Form -->
        <div id="addFormContainer" class="hidden mb-12 animate-in fade-in slide-in-from-top-4 duration-300">
            <div class="glass-panel p-8 rounded-[2.5rem] shadow-xl border-white/50">
                <form id="linkForm" class="grid grid-cols-1 md:grid-cols-12 gap-6">
                    <div class="md:col-span-4 space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">ชื่อเว็บไซต์</label>
                        <input type="text" id="siteTitle" placeholder="เช่น Streaming, Gmail" required
                            class="w-full p-4 rounded-2xl bg-white/50 border border-slate-100 outline-none focus:bg-white transition-all">
                    </div>
                    <div class="md:col-span-6 space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">URL (ลิงก์)</label>
                        <input type="text" id="siteUrl" placeholder="https://..." required
                            class="w-full p-4 rounded-2xl bg-white/50 border border-slate-100 outline-none focus:bg-white transition-all">
                    </div>
                    <div class="md:col-span-2 flex items-end">
                        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
                            บันทึก
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Links Grid -->
        <div id="linksGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
            <!-- ข้อมูลจะแสดงตรงนี้ -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-32 bg-white/30 rounded-[3rem] border-2 border-dashed border-slate-300">
            <div class="w-20 h-20 bg-slate-100 rounded-3xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="layout-template" class="text-slate-300 w-10 h-10"></i>
            </div>
            <h3 class="text-slate-800 font-bold">ยังไม่มีลิงก์</h3>
            <p class="text-slate-400 text-sm">กดปุ่ม + เพื่อเพิ่มทางลัดแรกของคุณ</p>
        </div>
    </div>

    <script>
        let links = JSON.parse(localStorage.getItem('premium_hub_links')) || [];
        const addFormContainer = document.getElementById('addFormContainer');
        const linkForm = document.getElementById('linkForm');
        const linksGrid = document.getElementById('linksGrid');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');

        function toggleAddForm() {
            const isHidden = addFormContainer.classList.contains('hidden');
            addFormContainer.classList.toggle('hidden');
            document.getElementById('addIcon').style.transform = isHidden ? 'rotate(45deg)' : 'rotate(0deg)';
            document.getElementById('addIcon').style.transition = 'transform 0.3s ease';
        }

        function saveLinks() {
            localStorage.setItem('premium_hub_links', JSON.stringify(links));
            renderLinks();
        }

        function getFavicon(url) {
            try {
                const domain = new URL(url).hostname;
                return `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
            } catch { return null; }
        }

        function renderLinks(filter = '') {
            linksGrid.innerHTML = '';
            const filteredLinks = links.filter(link => 
                link.title.toLowerCase().includes(filter.toLowerCase())
            );

            if (filteredLinks.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filteredLinks.forEach((link, index) => {
                    const card = document.createElement('div');
                    card.className = 'link-card group relative glass-panel p-6 rounded-[2.5rem] flex flex-col items-center gap-4 cursor-pointer';
                    
                    const favicon = getFavicon(link.url);
                    
                    card.innerHTML = `
                        <div onclick="window.open('${link.url}', '_blank')" class="w-full flex flex-col items-center">
                            <div class="icon-box w-20 h-20 rounded-3xl flex items-center justify-center mb-2 overflow-hidden border border-white shadow-sm transition-transform group-hover:scale-110">
                                ${favicon ? `<img src="${favicon}" class="w-12 h-12 object-contain" onerror="this.src='https://api.dicebear.com/7.x/initials/svg?seed=${link.title}'">` : `<i data-lucide="globe" class="text-slate-300"></i>`}
                            </div>
                            <span class="font-bold text-slate-800 text-xs text-center truncate w-full">${link.title}</span>
                            <span class="text-[9px] text-slate-400 font-medium truncate w-full text-center opacity-0 group-hover:opacity-100 transition-opacity">${new URL(link.url).hostname}</span>
                        </div>
                        
                        <button onclick="deleteLink(${index})" class="absolute top-3 right-3 bg-red-50 text-red-500 p-2 rounded-xl opacity-0 group-hover:opacity-100 transition shadow-sm hover:bg-red-500 hover:text-white">
                            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                        </button>
                    `;
                    linksGrid.appendChild(card);
                });
            }
            lucide.createIcons();
        }

        linkForm.onsubmit = (e) => {
            e.preventDefault();
            let url = document.getElementById('siteUrl').value.trim();
            const title = document.getElementById('siteTitle').value.trim();
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
            links.push({ title, url });
            linkForm.reset();
            toggleAddForm();
            saveLinks();
        };

        window.deleteLink = (index) => {
            if(confirm('ลบทางลัดนี้หรือไม่?')) {
                links.splice(index, 1);
                saveLinks();
            }
        };

        searchInput.oninput = (e) => renderLinks(e.target.value);

        renderLinks();
        lucide.createIcons();
    </script>
</body>
</html>
